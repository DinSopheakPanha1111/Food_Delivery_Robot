amcl:
  ros__parameters:
    use_sim_time: true

    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"
    scan_topic: "scan"
    map_topic: "map"

    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # ✅ Balanced motion noise (not too small)
    alpha1: 0.05
    alpha2: 0.05
    alpha3: 0.10
    alpha4: 0.10
    alpha5: 0.05

    # ✅ Enough particles for stability
    min_particles: 300
    max_particles: 1000

    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 2   # faster than 5 but not too aggressive

    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_min_range: 0.0
    laser_max_range: 12.0
    laser_likelihood_max_dist: 2.0
    lambda_short: 0.1

    # ✅ Less aggressive scan weight (avoid shaking)
    sigma_hit: 0.2
    z_hit: 0.7
    z_short: 0.1
    z_max: 0.05
    z_rand: 0.15

    do_beamskip: false

    # 🔥 THIS is the key for faster update
    update_min_d: 0.15
    update_min_a: 0.15

    tf_broadcast: true
    transform_tolerance: 0.3

    save_pose_rate: 0.5
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false

    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0