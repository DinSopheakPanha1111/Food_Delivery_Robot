amcl:
  ros__parameters:
    use_sim_time: true

    # Frames
    global_frame_id: "map"
    odom_frame_id: "odom"
    base_frame_id: "base_link"

    # Topics
    scan_topic: "scan"
    map_topic: "map"

    # Motion model
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # Odometry noise
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2

    # Particle filter
    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    resample_interval: 1

    # Recovery
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0

    # Laser model
    laser_model_type: "likelihood_field"
    max_beams: 60
    laser_min_range: 0.05
    laser_max_range: 12.0
    laser_likelihood_max_dist: 2.0
    lambda_short: 0.1
    sigma_hit: 0.2
    z_hit: 0.7
    z_short: 0.05
    z_max: 0.05
    z_rand: 0.2

    # Beam skipping
    do_beamskip: false
    beam_skip_distance: 0.5
    beam_skip_threshold: 0.3
    beam_skip_error_threshold: 0.9

    # Update thresholds
    update_min_d: 0.10
    update_min_a: 0.10

    # TF
    tf_broadcast: true
    transform_tolerance: 0.5

    # Pose saving / startup
    save_pose_rate: 0.5
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false

    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0