local_costmap:
  ros__parameters:
    global_frame: odom
    robot_base_frame: base_footprint
    rolling_window: true
    width: 3
    height: 3
    resolution: 0.05
    robot_radius: 0.24

    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: scan

      scan:
        topic: /scan
        data_type: "LaserScan"
        clearing: True
        marking: True
        raytrace_max_range: 5.0
        obstacle_max_range: 2.5

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.3
      cost_scaling_factor: 3.0

    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"

    always_send_full_costmap: true


global_costmap:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_footprint
    resolution: 0.05
    robot_radius: 0.24

    plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

    obstacle_layer:
      plugin: "nav2_costmap_2d::ObstacleLayer"
      observation_sources: scan

      scan:
        topic: /scan
        data_type: "LaserScan"
        clearing: True
        marking: True
        raytrace_max_range: 5.0
        obstacle_max_range: 2.5

    inflation_layer:
      plugin: "nav2_costmap_2d::InflationLayer"
      inflation_radius: 0.4
      cost_scaling_factor: 3.0

    static_layer:
      plugin: "nav2_costmap_2d::StaticLayer"

    always_send_full_costmap: true
