my_amcl:
  ros__parameters:

    # ── Particle filter ──────────────────────────────────────
    num_particles: 500          # More = accurate but slower. 300-500 is good for RPLIDAR A1.

    # ── Sensor model (likelihood field) ──────────────────────
    sigma_hit: 0.2              # Std dev (metres) of Gaussian around obstacle hits.
                                # Increase if your lidar is noisy.
    z_hit: 0.95                 # Weight given to the Gaussian hit model.
    z_rand: 0.05                # Weight given to random/uniform noise model.
    laser_max_range: 12.0       # RPLIDAR A1 max range is ~12m. Clamp here.
    laser_subsample: 5          # Use every 5th beam. A1 has 360 beams → 72 used per update.
                                # Reduce to 3 for better accuracy (but slower).

    # ── Motion model (odometry noise) ────────────────────────
    # These tune how much noise is added to particles during motion update.
    # Higher values = more spread = handles wheel slip / poor odometry.
    alpha1: 0.2   # rotation noise from rotation
    alpha2: 0.2   # rotation noise from translation
    alpha3: 0.2   # translation noise from translation
    alpha4: 0.2   # translation noise from rotation
