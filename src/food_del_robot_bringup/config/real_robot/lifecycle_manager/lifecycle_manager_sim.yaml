lifecycle_manager:
  ros__parameters:
    autostart: true
    node_names: 
      - 'map_server'
      - 'amcl'
      - 'global_costmap/global_costmap'
      - 'local_costmap/local_costmap'
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    bond_heartbeat_period: 0.25
    introspection_mode: "disabled"