lifecycle_manager:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - 'map_server'
      - 'keepout_filter_mask_server'
      - 'keepout_costmap_filter_info_server'
      - 'amcl'
      - 'planner_server'
    bond_timeout: 4.0
    attempt_respawn_reconnection: true
    bond_respawn_max_duration: 10.0
    bond_heartbeat_period: 0.25
    introspection_mode: "disabled"
