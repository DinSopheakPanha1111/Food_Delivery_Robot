bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000

    navigators: ["navigate_to_pose"]

    # Replans only when path becomes invalid (obstacle detected blocking path)
    # Does NOT replan on a timer — only triggers when local costmap actually sees something
    default_nav_to_pose_bt_xml: "/opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_only_if_path_becomes_invalid.xml"

    default_nav_through_poses_bt_xml: ""